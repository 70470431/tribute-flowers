<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>致敬烈士</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      background: #4a1515; /* 暗红色背景，匹配您的图片 */
      overflow: hidden;
    }
    
    /* 容器：宽度全屏/限宽，高度自适应图片比例 */
    .container {
      width: 100%;
      height: 100%;
      max-width: 100%; /* 手机端全宽 */
      margin: 0 auto;
      position: relative;
      background: #4a1515; /* 暗红色背景 */
      display: flex;
      align-items: center; /* 竖图上下居中 */
      justify-content: center;
    }
    
    /* 电脑端：限制宽度，保持竖屏比例 */
    @media (min-width: 481px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2d0d0d; /* 更深暗红 */
      }
      .container {
        width: auto; /* 宽度自适应图片比例 */
        max-width: 100vw;
        height: 100vh;
        aspect-ratio: 2546 / 3600; /* 保持您的图片比例 */
        background: #4a1515;
      }
    }
    
    .swiper {
      width: 100%;
      height: 100%;
    }
    
    .swiper-slide {
      position: relative;
      overflow: hidden;
      background: #4a1515; /* 暗红色背景 */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 图片：宽度填满，高度自适应，保持比例 */
    .swiper-slide img {
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: contain; /* 完整显示，不裁剪 */
      display: block;
    }
    
    /* 电脑端图片限制 */
    @media (min-width: 481px) {
      .swiper-slide img {
        width: auto;
        height: 100%;
        max-width: 100%;
      }
    }
    
    /* 献花区域 */
    #tribute-area {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 25%;
      cursor: pointer;
      z-index: 10;
    }
    
    /* 统计面板 - 适配暗红背景 */
    #stats-panel {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(74, 21, 21, 0.6); /* 暗红半透明 */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 69, 69, 0.3);
      border-radius: 24px;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: all 0.5s ease;
      z-index: 25;
      white-space: nowrap;
    }
    
    #stats-panel.show {
      opacity: 1;
    }
    
    #stats-panel .flower-icon {
      font-size: 20px;
    }
    
    #stats-panel .stats-text {
      color: rgba(255, 228, 228, 0.9);
      font-size: 13px;
      font-weight: 500;
    }
    
    #stats-panel .stats-number {
      color: #ff6b6b; /* 柔和红色 */
      font-size: 18px;
      font-weight: bold;
      min-width: 22px;
      text-align: center;
    }
    
    /* +1 动画 */
    .plus-one {
      position: fixed;
      color: #ff6b6b;
      font-size: 24px;
      font-weight: bold;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 0 0 12px rgba(255, 107, 107, 0.5);
      z-index: 100;
    }
    
    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-50px) scale(1.15);
      }
    }
    
    /* 花朵 */
    #flower {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      width: 90px;
      max-width: 25%;
      height: auto;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 20;
    }
    
    #flower.show {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(-50%) scale(1) rotate(0deg); }
      25% { transform: translateX(-50%) scale(1) rotate(-10deg) translateY(-5px); }
      50% { transform: translateX(-50%) scale(1) rotate(10deg) translateY(5px); }
      75% { transform: translateX(-50%) scale(1) rotate(-7deg) translateY(-3px); }
    }
    
    .shaking {
      animation: shake 0.5s ease-in-out;
    }
    
    /* 献花文字 */
    #tribute-text {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffe4e4;
      font-size: 16px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1s;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
      text-align: center;
      line-height: 1.6;
    }
    
    #tribute-text.show {
      opacity: 1;
    }
    
    /* 提示文字 */
    #hint-text {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 228, 228, 0.95);
      font-size: 15px;
      font-weight: 500;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      animation: pulse 2s infinite;
      pointer-events: none;
      z-index: 15;
      text-align: center;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
    }
    
    #hint-text.hide {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="img1.png" alt="烈士1"></div>
        <div class="swiper-slide"><img src="img2.png" alt="烈士2"></div>
        <div class="swiper-slide"><img src="img3.png" alt="烈士3"></div>
        <div class="swiper-slide"><img src="img4.png" alt="烈士4"></div>
        <div class="swiper-slide"><img src="img5.png" alt="烈士5"></div>
        <div class="swiper-slide"><img src="img6.png" alt="烈士6"></div>
        <div class="swiper-slide"><img src="img7.png" alt="烈士7"></div>
        
        <!-- 第8页：献花页面 -->
        <div class="swiper-slide">
          <img src="img8.png" alt="献花背景">
          
          <!-- 统计面板 -->
          <div id="stats-panel">
            <span class="flower-icon">🌸</span>
            <span class="stats-text">已献花</span>
            <span class="stats-number" id="count">0</span>
            <span class="stats-text">次</span>
          </div>
          
          <!-- 点击区域 -->
          <div id="tribute-area"></div>
          
          <!-- 提示 -->
          <div id="hint-text">👇 点击下方区域献花致敬</div>
          
          <!-- 花朵 -->
          <img id="flower" src="flower.png" alt="鲜花">
          
          <!-- 献花文字 -->
          <div id="tribute-text">🌸 向烈士敬献鲜花<br>致敬英雄！🌸</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper('.swiper', {
      direction: 'vertical',
      effect: 'slide',
      touchRatio: 1,
      resistance: true,
      on: {
        slideChange: function() {
          if (this.activeIndex !== 7) {
            resetTribute();
          }
        }
      }
    });
    
    const container = document.querySelector('.container');
    const tributeArea = document.getElementById('tribute-area');
    const flower = document.getElementById('flower');
    const tributeText = document.getElementById('tribute-text');
    const hintText = document.getElementById('hint-text');
    const statsPanel = document.getElementById('stats-panel');
    const countEl = document.getElementById('count');
    
    let personalCount = 0;
    let hasClicked = false;
    
    tributeArea.addEventListener('click', function(e) {
      e.stopPropagation();
      
      if (!hasClicked) {
        hasClicked = true;
        hintText.classList.add('hide');
        statsPanel.classList.add('show');
        flower.classList.add('show');
        
        setTimeout(() => {
          flower.classList.add('shaking');
        }, 350);
        
        setTimeout(() => {
          tributeText.classList.add('show');
        }, 600);
        
        setTimeout(() => {
          flower.classList.remove('shaking');
        }, 1000);
      }
      
      personalCount++;
      countEl.textContent = personalCount;
      createPlusOne(e);
    });
    
    function createPlusOne(e) {
      const plus = document.createElement('div');
      plus.className = 'plus-one';
      plus.textContent = '+1';
      
      const rect = container.getBoundingClientRect();
      
      let x = Math.max(rect.left, Math.min(e.clientX, rect.right));
      let y = Math.max(rect.top, Math.min(e.clientY, rect.bottom));
      
      plus.style.left = x + 'px';
      plus.style.top = y + 'px';
      
      document.body.appendChild(plus);
      
      setTimeout(() => {
        plus.remove();
      }, 1000);
    }
    
    function resetTribute() {
      hasClicked = false;
      personalCount = 0;
      countEl.textContent = '0';
      flower.classList.remove('show', 'shaking');
      tributeText.classList.remove('show');
      statsPanel.classList.remove('show');
      hintText.classList.remove('hide');
    }
  </script>

</body>
</html>
